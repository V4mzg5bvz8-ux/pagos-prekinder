let openStudents=new Set();
function money(n){return '$'+Math.round(n||0).toLocaleString('es-CL')}
function recSrc(rec,thumb=false){ if(!rec)return ''; if(typeof rec==='string')return rec; if(rec.url||rec.thumbUrl) return thumb?(rec.thumbUrl||rec.url||''):(rec.url||rec.thumbUrl||''); return thumb?(rec.thumb||rec.full||''):(rec.full||rec.thumb||''); }
function recHas(rec){return !!recSrc(rec,true)}
function calcStudent(s){let t=0; Object.entries({...extras,...months}).forEach(([k,v])=>{if(s.pay[k])t+=v[1]}); return t}
const TOTAL_ESPERADO=Object.values({...extras,...months}).reduce((a,v)=>a+v[1],0);
function save(){if(!readOnly)localStorage.setItem('fondosCursoV6',JSON.stringify(state))}
async function load(){
 const params=new URLSearchParams(location.search||'');
 const readPath=params.get('r');
 const vista=params.get('vista');
 const hash=location.hash||'';
 if(readPath){
   readOnly=true;
   try{
     const publicUrl=`${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${decodeURIComponent(readPath)}`;
     const res=await fetch(publicUrl,{cache:'no-store'});
     if(!res.ok) throw new Error('No se pudo cargar la lectura');
     state=await res.json();
   }catch(e){alert('No se pudo abrir el link de solo lectura. Crea un nuevo link. Detalle: '+e.message)}
 }
 else if(vista){readOnly=true; try{state=JSON.parse(decodeURIComponent(escape(atob(vista))))}catch(e){alert('No se pudo leer el link. Crea un nuevo link solo lectura.')} }

 else {try{const saved=JSON.parse(localStorage.getItem('fondosCursoV6')); if(saved) state=saved;}catch(e){}}
 if(!state.students)state.students=[]; if(!state.expenses)state.expenses=[];
}
function render(){
 document.getElementById('modeBadge').textContent=readOnly?'Solo lectura':'Admin'; document.getElementById('viewNote').classList.toggle('hide',!readOnly); document.querySelectorAll('.adminOnly').forEach(e=>e.classList.toggle('hide',readOnly));
 const income=state.students.reduce((a,s)=>a+calcStudent(s),0), exp=state.expenses.reduce((a,e)=>a+(+e.amount||0),0); incomeEl.textContent=money(income); expenseTotal.textContent=money(exp); balance.textContent=money(income-exp);
 const q=document.getElementById('q').value.toLowerCase(); students.innerHTML='';
 state.students.map((s,idx)=>({s,idx})).filter(o=>o.s.name.toLowerCase().includes(q)).forEach(({s,idx})=>{let total=calcStudent(s), pending=total<TOTAL_ESPERADO; let div=document.createElement('div'); div.className='student '+(pending?'pending ':'')+(openStudents.has(idx)?'open':''); div.innerHTML=`<div class="row" onclick="toggleOpen(${idx})"><div class="avatar">${idx+1}</div><div class="name">${s.name}</div><div class="amount">${money(total)}</div><div>⌄</div></div><div class="bar"><div class="fill" style="width:${Math.min(100,total/TOTAL_ESPERADO*100)}%"></div></div><div class="details"><h4>Pagos extras</h4><div class="checks">${Object.entries(extras).map(([k,v])=>payHtml(idx,k,v)).join('')}</div><h4>Mensualidades</h4><div class="checks">${Object.entries(months).map(([k,v])=>payHtml(idx,k,v)).join('')}</div></div>`; students.appendChild(div)});
 renderTotals(); save();
}

function payHtml(i,k,v){const s=state.students[i], checked=s.pay[k]?'checked':'', rec=s.receipts&&s.receipts[k], src=recSrc(rec,true); return `<label class="pay"><span><input ${readOnly?'disabled':''} type="checkbox" ${checked} onchange="togglePay(${i},'${k}',this.checked)"> ${v[0]} <small>${money(v[1])}</small></span><span class="receiptBox"><button class="receipt" onclick="event.preventDefault();receiptPay(${i},'${k}')">${recHas(rec)?'📷 Ver':'📎 Comprobante'}</button>${readOnly&&src?`<img class="miniRec" src="${src}" onclick="event.preventDefault();receiptPay(${i},'${k}')">`:''}</span></label>`}

function receiptPay(i,k){let s=state.students[i]; s.receipts=s.receipts||{}; const rec=s.receipts[k]; let html=`<h2>${s.name}</h2><p>${[...(Object.entries(extras)),...(Object.entries(months))].find(x=>x[0]==k)[1][0]}</p>`; if(recHas(rec)){ const src=readOnly?recSrc(rec,true):recSrc(rec,false); html+=`<p>Comprobante:</p><img class="preview ${readOnly?'readfull':''}" src="${src}" onclick="this.classList.toggle('readfull')">`; setTimeout(()=>document.querySelector('.box')?.classList.add('imageBox'),0); } else if(readOnly){ html+=`<p>Sin comprobante disponible.</p>`; } if(!readOnly) html+=`<input class="inp" type="file" accept="image/*" onchange="fileToPay(${i},'${k}',this)"><button class="btn red" onclick="deletePayReceipt(${i},'${k}')">Borrar comprobante</button>`; modalContent.innerHTML=html; modal.classList.add('show')}

async function fileToPay(i,k,input){
 const f=input.files[0]; if(!f)return;
 modalContent.innerHTML='<h2>Subiendo comprobante...</h2><p>Guardando la foto fuera del enlace.</p>';
 try{state.students[i].receipts[k]=await uploadImageToSupabase(f,'pago_'+safeName(state.students[i].name)+'_'+k); closeModal(); render();}
 catch(e){alert('No se pudo subir a Supabase. Detalle: '+e.message); imageToDataUrls(f,(data)=>{state.students[i].receipts[k]=data; closeModal(); render()})}
}
function safeName(t){return (t||'archivo').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]+/g,'_').slice(0,60)}
function dataUrlToBlob(dataUrl){try{const arr=dataUrl.split(','), mime=(arr[0].match(/:(.*?);/)||[])[1]||'image/jpeg'; const bin=atob(arr[1]); let n=bin.length; const u8=new Uint8Array(n); while(n--)u8[n]=bin.charCodeAt(n); return new Blob([u8],{type:mime})}catch(e){return null}}
function canvasBlob(img,max,quality){let w=img.width,h=img.height; if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max} const c=document.createElement('canvas'); c.width=w; c.height=h; const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h); return new Promise(res=>c.toBlob(res,'image/jpeg',quality))}
function fileToImage(file){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=()=>{const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=r.result}; r.onerror=reject; r.readAsDataURL(file)})}
async function putSupabase(path,blob,type='image/jpeg'){
 if(!sb) throw new Error('Cliente de Supabase no disponible');
 let uploadable;
 try{
   const filename=path.split('/').pop()||'archivo';
   uploadable=new File([blob],filename,{type});
 }catch(convErr){ uploadable=blob; }
 const {error}=await sb.storage.from(SUPABASE_BUCKET).upload(path,uploadable,{contentType:type,upsert:true});
 if(error) throw new Error('Supabase rechazó '+path+': '+error.message);
 return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${path}`;
}
async function uploadImageToSupabase(file,prefix='comp'){
 const img=await fileToImage(file); const id=Date.now()+'_'+Math.random().toString(36).slice(2,8); const base=safeName(prefix)+'_'+id;
 const full=await canvasBlob(img,1800,0.90); const thumb=await canvasBlob(img,420,0.78);
 const url=await putSupabase(base+'.jpg',full); const thumbUrl=await putSupabase(base+'_thumb.jpg',thumb);
 return {url,thumbUrl};
}
async function ensureUploadedReceipt(rec,prefix){
 if(!rec || rec.url || rec.thumbUrl) return rec;
 const full=recSrc(rec,false), thumb=recSrc(rec,true);
 if(!full && !thumb) return rec;
 try{
   const id=Date.now()+'_'+Math.random().toString(36).slice(2,8), base=safeName(prefix)+'_'+id;
   const fullBlob=full?dataUrlToBlob(full):null, thumbBlob=thumb?dataUrlToBlob(thumb):null;
   const url=fullBlob?await putSupabase(base+'.jpg',fullBlob):'';
   const thumbUrl=thumbBlob?await putSupabase(base+'_thumb.jpg',thumbBlob):(url||'');
   if(!url && !thumbUrl) return rec;
   return {url:url||thumbUrl,thumbUrl:thumbUrl||url};
 }catch(e){console.warn('No se pudo migrar comprobante a Supabase',e); return rec;}
}

function deletePayReceipt(i,k){delete state.students[i].receipts[k]; closeModal(); render()}
function renderTotals(){
 const monthOrder=Object.keys(months);
 monthTotals.innerHTML=Object.entries(months).map(([k,v])=>{
   const activos=state.students.filter(s=>{ if(!s.withdrawnFrom) return true; return monthOrder.indexOf(k) < monthOrder.indexOf(s.withdrawnFrom); });
   const totalAlumnos=activos.length;
   const pagados=activos.filter(s=>s.pay[k]).length;
   const completo=totalAlumnos>0 && pagados===totalAlumnos;
   return `<div class="pill ${completo?'done':'pendingMonth'}">${v[0]}<br>${money(pagados*v[1])}<br><small>${pagados}/${totalAlumnos}</small></div>`
 }).join('');
 extraTotals.innerHTML=Object.entries(extras).map(([k,v])=>`<div class="pill">${v[0]}<br>${money(state.students.filter(s=>s.pay[k]).length*v[1])}</div>`).join('')
}
function addStudent(){const n=prompt('Nombre del alumno'); if(n){state.students.push(emptyStudent(n)); openStudents.add(state.students.length-1); render()}}
function openExpenses(){let html='<h2>Detalle de gastos</h2>'; if(!readOnly) html+=`<input id="edesc" class="inp" placeholder="Descripción"><input id="eam" class="inp" type="number" placeholder="Monto"><input id="efile" class="inp" type="file" accept="image/*"><button class="btn green" onclick="addExpense()">Agregar gasto</button>`; html+=state.expenses.map((e,i)=>`<div class="expense"><div><b>${e.desc||'Gasto'}</b><br>${money(e.amount)} ${recHas(e.receipt)?'📷':''}</div><div><button class="receipt" onclick="viewExpense(${i})">Ver</button>${readOnly?'':` <button class="receipt" onclick="delExpense(${i})">Borrar</button>`}</div></div>`).join('')||'<p>Sin gastos.</p>'; modalContent.innerHTML=html; modal.classList.add('show')}

async function addExpense(){
 const desc=edesc.value.trim(), amount=+eam.value||0, f=efile.files[0]; const obj={desc,amount};
 if(f){modalContent.innerHTML='<h2>Subiendo comprobante...</h2><p>Guardando la foto fuera del enlace.</p>'; try{obj.receipt=await uploadImageToSupabase(f,'gasto_'+safeName(desc||'gasto')); state.expenses.push(obj); openExpenses(); render()}catch(e){alert('No se pudo subir a Supabase. Detalle: '+e.message); imageToDataUrls(f,(data)=>{obj.receipt=data; state.expenses.push(obj); openExpenses(); render()})}}
 else {state.expenses.push(obj); openExpenses(); render()}
}

function viewExpense(i){
 const e=state.expenses[i];
 let html=`<h2>${e.desc||'Gasto'}</h2><h3>${money(e.amount)}</h3>`;
 if(recHas(e.receipt)){
   html+=`<img class="preview ${readOnly?'readfull':''}" src="${readOnly?recSrc(e.receipt,true):recSrc(e.receipt,false)}" onclick="this.classList.toggle('readfull')">`;
 }else{
   html+='<p>Sin comprobante.</p>';
 }
 if(!readOnly){
   html+=`<div style="margin-top:14px">
     <input id="expenseReceiptFile" class="inp" type="file" accept="image/*">
     <button class="btn green" onclick="uploadExpenseReceipt(${i})">${recHas(e.receipt)?'Cambiar comprobante':'Subir comprobante'}</button>
     ${recHas(e.receipt)?`<button class="btn red" onclick="deleteExpenseReceipt(${i})">Borrar comprobante</button>`:''}
     <button class="btn gray" onclick="openExpenses()">Volver a gastos</button>
   </div>`;
 }
 modalContent.innerHTML=html;
}
async function uploadExpenseReceipt(i){
 const f=document.getElementById('expenseReceiptFile')?.files?.[0];
 if(!f){alert('Selecciona una imagen del comprobante.');return}
 const e=state.expenses[i];
 modalContent.innerHTML='<h2>Subiendo comprobante...</h2><p>Guardando la foto fuera del enlace.</p>';
 try{
   e.receipt=await uploadImageToSupabase(f,'gasto_'+safeName(e.desc||'gasto'));
   save(); render(); viewExpense(i);
 }catch(err){
   alert('No se pudo subir a Supabase. Detalle: '+err.message);
   imageToDataUrls(f,(data)=>{e.receipt=data; save(); render(); viewExpense(i)})
 }
}
function deleteExpenseReceipt(i){
 if(confirm('¿Borrar comprobante de este gasto?')){
   delete state.expenses[i].receipt;
   save(); render(); viewExpense(i);
 }
}
function delExpense(i){if(confirm('¿Borrar gasto?')){state.expenses.splice(i,1);openExpenses();render()}}
function closeModal(){modal.classList.remove('show')}
function resetAll(){if(confirm('¿Reiniciar todo?')){state={students:defaultNames.map(emptyStudent),expenses:[]};localStorage.removeItem('fondosCursoV6');render()}}
function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=src})}

async function migrateReceiptsToSupabase(){
 let changed=false;
 for(const s of state.students){
   s.receipts=s.receipts||{};
   for(const k of Object.keys(s.receipts)){
     try{ const before=s.receipts[k]; const after=await ensureUploadedReceipt(before,'pago_'+safeName(s.name)+'_'+k); if(after!==before){s.receipts[k]=after; changed=true;} }
     catch(e){ console.warn('Comprobante omitido por error de red:',s.name,k,e); }
   }
 }
 for(const e of state.expenses){
   if(e.receipt){
     try{ const before=e.receipt; const after=await ensureUploadedReceipt(before,'gasto_'+safeName(e.desc||'gasto')); if(after!==before){e.receipt=after; changed=true;} }
     catch(err){ console.warn('Comprobante de gasto omitido por error de red:',e.desc,err); }
   }
 }
 if(changed) save();
}
async function publicState(includePhotos=true){
 await migrateReceiptsToSupabase();
 const students=state.students.map(s=>{
   const receipts={};
   for(const [k,r] of Object.entries(s.receipts||{})) receipts[k]=includePhotos?{url:recSrc(r,false),thumbUrl:recSrc(r,true)}:true;
   return {name:s.name,pay:s.pay,receipts};
 });
 const expenses=state.expenses.map(e=>({desc:e.desc,amount:e.amount,receipt:recHas(e.receipt)?(includePhotos?{url:recSrc(e.receipt,false),thumbUrl:recSrc(e.receipt,true)}:true):null}));
 return {students,expenses};
}
async function buildReadUrl(includePhotos=true){
 const pub=await publicState(includePhotos);
 const id='lecturas/lectura_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.json';
 const blob=new Blob([JSON.stringify(pub)],{type:'application/json'});
 await putSupabase(id,blob,'application/json');
 return location.origin+location.pathname+'?r='+encodeURIComponent(id);
}
async function makeShare(){
 modalContent.innerHTML='<h2>Preparando link...</h2><p>Subiendo comprobantes y guardando lectura en Supabase.</p>';
 modal.classList.add('show');
 try{
   const url=await buildReadUrl(true);
   navigator.clipboard?.writeText(url);
   modalContent.innerHTML=`<h2>Link solo lectura</h2><p>Link corto copiado. Los apoderados solo pueden visualizar y las fotos se cargan desde Supabase.</p><textarea class="inp" style="height:80px">${url}</textarea><button class="btn green" onclick="navigator.share?navigator.share({title:'Fondos del Curso',url:'${url}'}):0">Compartir por WhatsApp</button>`;
 }catch(e){
   modalContent.innerHTML=`<h2>Error al crear link</h2><p>No se pudo guardar la lectura en Supabase.</p><p>${e.message}</p>`;
 }
}
function canvasData(img,max,quality){let w=img.width,h=img.height; if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max} const c=document.createElement('canvas'); c.width=w; c.height=h; const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h); return c.toDataURL('image/jpeg',quality)}
function imageToDataUrls(file,cb){const r=new FileReader(); r.onload=()=>{const img=new Image(); img.onload=()=>{cb({full:canvasData(img,1400,0.82),thumb:canvasData(img,260,0.70)})}; img.src=r.result}; r.readAsDataURL(file)}
function downloadBackup(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='respaldo_fondos_curso.json';a.click()}
const incomeEl=document.getElementById('income'); load().then(render);
